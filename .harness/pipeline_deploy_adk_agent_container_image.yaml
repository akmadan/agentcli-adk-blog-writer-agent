template:
  name: ADK Agent Deploy to Agent Runtime (Container Image)
  identifier: ADK_Agent_Deploy_to_Agent_Runtime_Container_Image
  versionLabel: v1
  type: Pipeline
  projectIdentifier: akshitdevrelharness
  orgIdentifier: default
  tags: {}
  spec:
    properties:
      ci:
        codebase:
          connectorRef: <+input>
          repoName: <+input>
          build: <+input>

    stages:

      # ╔══════════════════════════════════════════════════════════════════╗
      # ║  STAGE 1: CI — Build, Test, Push to Google Artifact Registry   ║
      # ╚══════════════════════════════════════════════════════════════════╝
      - stage:
          name: CI - Build and Push
          identifier: ci_build_and_push
          description: "Clone, validate, test, build Docker image, push to GAR"
          type: CI
          spec:
            cloneCodebase: true
            platform:
              os: Linux
              arch: Amd64
            runtime:
              type: Cloud
              spec: {}
            execution:
              steps:

                # ── 1.1: Setup GCP credentials ──
                - step:
                    type: Run
                    name: Setup GCP Credentials
                    identifier: setup_gcp_credentials
                    spec:
                      shell: Bash
                      command: |
                        echo "=== Writing GCP service account key ==="
                        echo '<+secrets.getValue("gcp_sa_key_json")>' > /tmp/gcp-sa-key.json
                        chmod 600 /tmp/gcp-sa-key.json

                        GCP_PROJECT=$(python3 -c "import json; print(json.load(open('/tmp/gcp-sa-key.json'))['project_id'])")
                        GCP_REGION="<+secrets.getValue("gcp_region")>"
                        GCP_REGION="${GCP_REGION:-us-east1}"

                        echo "=== Activating service account via gcloud ==="
                        gcloud auth activate-service-account --key-file=/tmp/gcp-sa-key.json --project="$GCP_PROJECT"
                        gcloud config set project "$GCP_PROJECT"

                        echo "=== Writing shared env file ==="
                        cat > /tmp/gcp-env.sh <<EOF
                        export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-sa-key.json
                        export GOOGLE_GENAI_USE_VERTEXAI=true
                        export GOOGLE_CLOUD_PROJECT=$GCP_PROJECT
                        export GOOGLE_CLOUD_LOCATION=$GCP_REGION
                        EOF
                        sed -i 's/^[[:space:]]*//' /tmp/gcp-env.sh

                        cat > .env <<DOTENV
                        GOOGLE_GENAI_USE_VERTEXAI=1
                        GOOGLE_CLOUD_PROJECT=$GCP_PROJECT
                        GOOGLE_CLOUD_LOCATION=$GCP_REGION
                        GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-sa-key.json
                        DOTENV
                        sed -i 's/^[[:space:]]*//' .env

                        echo "Configured for project: $GCP_PROJECT, region: $GCP_REGION"

                # ── 1.2: Validate project structure ──
                - step:
                    type: Run
                    name: Validate Project Structure
                    identifier: validate_project_structure
                    spec:
                      shell: Bash
                      command: |
                        echo "=== Validating ADK agent project structure ==="
                        ERRORS=0

                        for f in "pyproject.toml" "Dockerfile"; do
                          if [ ! -f "$f" ]; then
                            echo "FAIL: Missing $f"
                            ERRORS=$((ERRORS + 1))
                          else
                            echo "  OK: $f"
                          fi
                        done

                        AGENT_DIR=""
                        if [ -f "agents-cli-manifest.yaml" ]; then
                          AGENT_DIR=$(grep '^agent_directory:' agents-cli-manifest.yaml | awk '{print $2}' | tr -d '"')
                          echo "  OK: agents-cli-manifest.yaml (agent_directory=$AGENT_DIR)"
                        fi

                        if [ -z "$AGENT_DIR" ]; then
                          AGENT_DIR=$(find . -maxdepth 2 -name "agent.py" -path "*/agent.py" | head -1 | xargs dirname 2>/dev/null | sed 's|^\./||')
                        fi

                        if [ -z "$AGENT_DIR" ]; then
                          echo "FAIL: Could not find agent directory"
                          exit 1
                        fi
                        echo "  OK: agent_directory = $AGENT_DIR"
                        echo "$AGENT_DIR" > /tmp/agent_directory.txt

                        for f in "$AGENT_DIR/__init__.py" "$AGENT_DIR/agent.py"; do
                          if [ ! -f "$f" ]; then
                            echo "FAIL: Missing $f"
                            ERRORS=$((ERRORS + 1))
                          else
                            echo "  OK: $f"
                          fi
                        done

                        if grep -q "google-adk" pyproject.toml 2>/dev/null || grep -q "google-adk" requirements.txt 2>/dev/null; then
                          echo "  OK: google-adk dependency found"
                        else
                          echo "WARN: google-adk dependency not found in pyproject.toml or requirements.txt"
                        fi

                        if [ $ERRORS -gt 0 ]; then
                          echo "FAILED: $ERRORS validation error(s)."
                          exit 1
                        fi
                        echo "All validations passed."

                # ── 1.3: Install dependencies and run tests ──
                - step:
                    type: Run
                    name: Install and Test
                    identifier: install_and_test
                    spec:
                      shell: Bash
                      command: |
                        source /tmp/gcp-env.sh
                        echo "=== Installing uv ==="
                        curl -LsSf https://astral.sh/uv/install.sh | sh
                        export PATH="$HOME/.local/bin:$PATH"

                        echo "=== Syncing dependencies ==="
                        SYNC_CMD="uv sync"
                        for group in dev deployment; do
                          if grep -qP "^\[dependency-groups\]" pyproject.toml 2>/dev/null && grep -qP "^${group}\s*=" pyproject.toml 2>/dev/null; then
                            SYNC_CMD="$SYNC_CMD --group $group"
                          fi
                        done
                        $SYNC_CMD

                        echo "=== Running tests ==="
                        if [ -d "tests" ]; then
                          uv run pytest tests -v --tb=short
                        else
                          echo "WARN: No tests/ directory found."
                        fi

                        echo "=== Running evaluations ==="
                        EVAL_DIRS=""
                        for candidate in eval tests/eval; do
                          if find "$candidate" -name "test_*.py" -o -name "*_test.py" 2>/dev/null | grep -q .; then
                            EVAL_DIRS="$EVAL_DIRS $candidate"
                          fi
                        done
                        if [ -n "$EVAL_DIRS" ]; then
                          uv run pytest $EVAL_DIRS -v --tb=short || {
                            echo "WARN: Eval threshold not met (non-blocking)."
                          }
                        else
                          echo "WARN: No eval test files found."
                        fi

                        echo "Tests and evaluations complete."

                # ── 1.4: Build and push Docker image to GAR ──
                - step:
                    type: BuildAndPushGAR
                    name: Build and Push to GAR
                    identifier: build_and_push_gar
                    spec:
                      connectorRef: <+input>
                      host: <+input>
                      projectID: <+input>
                      imageName: <+input>
                      tags:
                        - <+pipeline.sequenceId>
                        - latest

      # ╔══════════════════════════════════════════════════════════════════╗
      # ║  STAGE 2: CD — Deploy Container Image to Agent Runtime         ║
      # ╚══════════════════════════════════════════════════════════════════╝
      - stage:
          name: CD - Deploy to Agent Runtime
          identifier: cd_deploy_to_agent_runtime
          description: "Deploy container image from GAR to GCP Agent Runtime via Vertex AI SDK"
          type: CI
          spec:
            cloneCodebase: false
            platform:
              os: Linux
              arch: Amd64
            runtime:
              type: Cloud
              spec: {}
            execution:
              steps:

                # ── 2.1: Setup GCP credentials ──
                - step:
                    type: Run
                    name: Setup GCP Credentials
                    identifier: cd_setup_gcp_credentials
                    spec:
                      shell: Bash
                      command: |
                        echo "=== Writing GCP service account key ==="
                        echo '<+secrets.getValue("gcp_sa_key_json")>' > /tmp/gcp-sa-key.json
                        chmod 600 /tmp/gcp-sa-key.json

                        GCP_PROJECT=$(python3 -c "import json; print(json.load(open('/tmp/gcp-sa-key.json'))['project_id'])")
                        GCP_REGION="<+secrets.getValue("gcp_region")>"
                        GCP_REGION="${GCP_REGION:-us-east1}"

                        gcloud auth activate-service-account --key-file=/tmp/gcp-sa-key.json --project="$GCP_PROJECT"
                        gcloud config set project "$GCP_PROJECT"

                        cat > /tmp/gcp-env.sh <<EOF
                        export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-sa-key.json
                        export GOOGLE_GENAI_USE_VERTEXAI=true
                        export GOOGLE_CLOUD_PROJECT=$GCP_PROJECT
                        export GOOGLE_CLOUD_LOCATION=$GCP_REGION
                        EOF
                        sed -i 's/^[[:space:]]*//' /tmp/gcp-env.sh

                        echo "=== Installing Vertex AI SDK ==="
                        pip install --quiet "google-cloud-aiplatform[agent_engines]>=1.144"

                        echo "Configured for project: $GCP_PROJECT, region: $GCP_REGION"

                # ── 2.2: Capture current revision for rollback ──
                - step:
                    type: Run
                    name: Capture Current Revision
                    identifier: cd_capture_current_revision
                    spec:
                      shell: Bash
                      command: |
                        source /tmp/gcp-env.sh

                        API_BASE="https://${GOOGLE_CLOUD_LOCATION}-aiplatform.googleapis.com/v1beta1"
                        TOKEN=$(gcloud auth print-access-token)

                        echo "=== Discovering existing agent ==="
                        ENGINES_JSON=$(curl -s -X GET \
                          -H "Authorization: Bearer $TOKEN" \
                          "${API_BASE}/projects/${GOOGLE_CLOUD_PROJECT}/locations/${GOOGLE_CLOUD_LOCATION}/reasoningEngines")

                        RESOURCE_NAME=$(echo "$ENGINES_JSON" | python3 -c "
                        import sys, json
                        data = json.load(sys.stdin)
                        engines = data.get('reasoningEngines', [])
                        if engines:
                            print(engines[-1]['name'])
                        " 2>/dev/null || true)

                        if [ -z "$RESOURCE_NAME" ]; then
                          echo "No existing agent found. First deployment."
                          echo "" > /tmp/old_revision.txt
                          echo "" > /tmp/agent_resource_name.txt
                          exit 0
                        fi

                        echo "$RESOURCE_NAME" > /tmp/agent_resource_name.txt
                        echo "Agent resource: $RESOURCE_NAME"

                        echo "=== Listing current revisions ==="
                        REVISIONS_JSON=$(curl -s -X GET \
                          -H "Authorization: Bearer $TOKEN" \
                          "${API_BASE}/${RESOURCE_NAME}/runtimeRevisions")

                        OLD_REVISION=$(echo "$REVISIONS_JSON" | python3 -c "
                        import sys, json
                        data = json.load(sys.stdin)
                        revs = data.get('reasoningEngineRuntimeRevisions', [])
                        if revs:
                            revs.sort(key=lambda r: r.get('createTime', ''), reverse=True)
                            print(revs[0]['name'])
                        " 2>/dev/null || true)

                        echo "$OLD_REVISION" > /tmp/old_revision.txt
                        echo "Current active revision: ${OLD_REVISION:-none}"

                # ── 2.3: Deploy container image to Agent Runtime ──
                - step:
                    type: Run
                    name: Deploy Container Image
                    identifier: cd_deploy_container_image
                    spec:
                      shell: Bash
                      command: |
                        source /tmp/gcp-env.sh

                        IMAGE_URI="<+pipeline.stages.ci_build_and_push.spec.execution.steps.build_and_push_gar.spec.host>/<+pipeline.stages.ci_build_and_push.spec.execution.steps.build_and_push_gar.spec.projectID>/<+pipeline.stages.ci_build_and_push.spec.execution.steps.build_and_push_gar.spec.imageName>:<+pipeline.sequenceId>"

                        RESOURCE_NAME=$(cat /tmp/agent_resource_name.txt 2>/dev/null || echo "")
                        DISPLAY_NAME="<+input>.defaultValue("adk-agent")"

                        echo "=== Deploying to Agent Runtime ==="
                        echo "Image:   $IMAGE_URI"
                        echo "Project: $GOOGLE_CLOUD_PROJECT"
                        echo "Region:  $GOOGLE_CLOUD_LOCATION"

                        if [ -n "$RESOURCE_NAME" ]; then
                          echo "Updating existing agent: $RESOURCE_NAME"
                          python3 <<PYEOF
                        import vertexai

                        vertexai.init(
                            project="$GOOGLE_CLOUD_PROJECT",
                            location="$GOOGLE_CLOUD_LOCATION",
                        )

                        client = vertexai.Client(
                            project="$GOOGLE_CLOUD_PROJECT",
                            location="$GOOGLE_CLOUD_LOCATION",
                        )

                        remote_agent = client.agent_engines.update(
                            name="$RESOURCE_NAME",
                            config={
                                "container_spec": {
                                    "image_uri": "$IMAGE_URI",
                                },
                                "display_name": "$DISPLAY_NAME",
                            },
                        )
                        print(f"Updated agent: {remote_agent.api_resource.name}")
                        PYEOF
                        else
                          echo "Creating new agent deployment"
                          python3 <<PYEOF
                        import vertexai

                        vertexai.init(
                            project="$GOOGLE_CLOUD_PROJECT",
                            location="$GOOGLE_CLOUD_LOCATION",
                        )

                        client = vertexai.Client(
                            project="$GOOGLE_CLOUD_PROJECT",
                            location="$GOOGLE_CLOUD_LOCATION",
                        )

                        remote_agent = client.agent_engines.create(
                            config={
                                "container_spec": {
                                    "image_uri": "$IMAGE_URI",
                                },
                                "display_name": "$DISPLAY_NAME",
                            },
                        )
                        print(f"Created agent: {remote_agent.api_resource.name}")
                        with open("/tmp/agent_resource_name.txt", "w") as f:
                            f.write(remote_agent.api_resource.name)
                        PYEOF
                        fi

                        echo "Deployment successful."

                        # Discover new revision
                        sleep 10
                        API_BASE="https://${GOOGLE_CLOUD_LOCATION}-aiplatform.googleapis.com/v1beta1"
                        TOKEN=$(gcloud auth print-access-token)
                        RESOURCE_NAME=$(cat /tmp/agent_resource_name.txt)

                        REVISIONS_JSON=$(curl -s -X GET \
                          -H "Authorization: Bearer $TOKEN" \
                          "${API_BASE}/${RESOURCE_NAME}/runtimeRevisions")

                        NEW_REVISION=$(echo "$REVISIONS_JSON" | python3 -c "
                        import sys, json
                        data = json.load(sys.stdin)
                        revs = data.get('reasoningEngineRuntimeRevisions', [])
                        if revs:
                            revs.sort(key=lambda r: r.get('createTime', ''), reverse=True)
                            print(revs[0]['name'])
                        " 2>/dev/null || true)

                        echo "$NEW_REVISION" > /tmp/new_revision.txt
                        echo "New revision: $NEW_REVISION"

                # ── 2.4: Canary traffic split ──
                - step:
                    type: Run
                    name: Canary Traffic Split
                    identifier: cd_canary_traffic_split
                    spec:
                      shell: Bash
                      command: |
                        source /tmp/gcp-env.sh

                        OLD_REVISION=$(cat /tmp/old_revision.txt 2>/dev/null || echo "")
                        NEW_REVISION=$(cat /tmp/new_revision.txt 2>/dev/null || echo "")
                        RESOURCE_NAME=$(cat /tmp/agent_resource_name.txt 2>/dev/null || echo "")
                        RESOURCE_ID=$(echo "$RESOURCE_NAME" | grep -oP 'reasoningEngines/\K\S+')
                        API_BASE="https://${GOOGLE_CLOUD_LOCATION}-aiplatform.googleapis.com/v1beta1"
                        TOKEN=$(gcloud auth print-access-token)

                        if [ -z "$OLD_REVISION" ] || [ "$OLD_REVISION" = "$NEW_REVISION" ]; then
                          echo "First deployment or single revision -- skipping canary."
                          exit 0
                        fi

                        echo "=== Canary: 90% old / 10% new ==="
                        curl -s -X PATCH \
                          -H "Authorization: Bearer $TOKEN" \
                          -H "Content-Type: application/json" \
                          -d "{
                            \"trafficConfig\": {
                              \"trafficSplitManual\": {
                                \"targets\": [
                                  {\"runtimeRevisionName\": \"$OLD_REVISION\", \"percent\": 90},
                                  {\"runtimeRevisionName\": \"$NEW_REVISION\", \"percent\": 10}
                                ]
                              }
                            }
                          }" \
                          "${API_BASE}/projects/${GOOGLE_CLOUD_PROJECT}/locations/${GOOGLE_CLOUD_LOCATION}/reasoningEngines/${RESOURCE_ID}?update_mask=traffic_config"

                        echo "Canary configured: 90/10"

                # ── 2.5: Smoke test ──
                - step:
                    type: Run
                    name: Smoke Test
                    identifier: cd_smoke_test
                    spec:
                      shell: Bash
                      command: |
                        source /tmp/gcp-env.sh

                        RESOURCE_NAME=$(cat /tmp/agent_resource_name.txt 2>/dev/null || echo "")
                        if [ -z "$RESOURCE_NAME" ]; then
                          echo "FAIL" > /tmp/smoke_result.txt
                          echo "No agent resource found."
                          exit 0
                        fi

                        API_BASE="https://${GOOGLE_CLOUD_LOCATION}-aiplatform.googleapis.com/v1beta1"
                        TOKEN=$(gcloud auth print-access-token)

                        echo "=== Smoke testing deployed agent ==="
                        RESPONSE=$(curl -s -X POST \
                          -H "Authorization: Bearer $TOKEN" \
                          -H "Content-Type: application/json" \
                          -d '{"class_method": "stream_query", "input": {"message": "Hello, what can you help me with?", "user_id": "smoke-test"}}' \
                          "${API_BASE}/${RESOURCE_NAME}:query" 2>&1) || true

                        echo "=== Response ==="
                        echo "$RESPONSE" | head -50
                        echo ""

                        if [ -z "$RESPONSE" ]; then
                          echo "FAIL" > /tmp/smoke_result.txt
                          echo "Smoke test FAILED: Empty response."
                          exit 0
                        fi

                        if echo "$RESPONSE" | grep -iq "\"error\""; then
                          echo "FAIL" > /tmp/smoke_result.txt
                          echo "Smoke test FAILED: Agent returned an error."
                          exit 0
                        fi

                        echo "PASS" > /tmp/smoke_result.txt
                        echo "Smoke test PASSED."

                # ── 2.6: Promote or Rollback ──
                - step:
                    type: Run
                    name: Promote or Rollback
                    identifier: cd_promote_or_rollback
                    spec:
                      shell: Bash
                      command: |
                        source /tmp/gcp-env.sh

                        SMOKE_RESULT=$(cat /tmp/smoke_result.txt 2>/dev/null || echo "FAIL")
                        OLD_REVISION=$(cat /tmp/old_revision.txt 2>/dev/null || echo "")
                        NEW_REVISION=$(cat /tmp/new_revision.txt 2>/dev/null || echo "")
                        RESOURCE_NAME=$(cat /tmp/agent_resource_name.txt 2>/dev/null || echo "")
                        RESOURCE_ID=$(echo "$RESOURCE_NAME" | grep -oP 'reasoningEngines/\K\S+')
                        API_BASE="https://${GOOGLE_CLOUD_LOCATION}-aiplatform.googleapis.com/v1beta1"
                        TOKEN=$(gcloud auth print-access-token)

                        if [ -z "$OLD_REVISION" ] || [ "$OLD_REVISION" = "$NEW_REVISION" ]; then
                          if [ "$SMOKE_RESULT" = "PASS" ]; then
                            echo "=== First deployment: always-latest ==="
                            curl -s -X PATCH \
                              -H "Authorization: Bearer $TOKEN" \
                              -H "Content-Type: application/json" \
                              -d '{"trafficConfig": {"trafficSplitAlwaysLatest": {}}}' \
                              "${API_BASE}/projects/${GOOGLE_CLOUD_PROJECT}/locations/${GOOGLE_CLOUD_LOCATION}/reasoningEngines/${RESOURCE_ID}?update_mask=traffic_config"
                            echo "Pipeline PASSED. Agent deployed."
                          else
                            echo "Pipeline FAILED. Smoke test failed on first deployment."
                            exit 1
                          fi
                          exit 0
                        fi

                        if [ "$SMOKE_RESULT" = "PASS" ]; then
                          echo "=== PROMOTING new revision to 100% ==="
                          curl -s -X PATCH \
                            -H "Authorization: Bearer $TOKEN" \
                            -H "Content-Type: application/json" \
                            -d "{
                              \"trafficConfig\": {
                                \"trafficSplitManual\": {
                                  \"targets\": [
                                    {\"runtimeRevisionName\": \"$NEW_REVISION\", \"percent\": 100}
                                  ]
                                }
                              }
                            }" \
                            "${API_BASE}/projects/${GOOGLE_CLOUD_PROJECT}/locations/${GOOGLE_CLOUD_LOCATION}/reasoningEngines/${RESOURCE_ID}?update_mask=traffic_config"

                          echo ""
                          echo "Pipeline PASSED. New revision promoted."
                          echo "Resource: $RESOURCE_NAME"
                          echo "Revision: $NEW_REVISION"
                          echo ""
                          echo "Rollback command:"
                          echo "  curl -X PATCH -H 'Authorization: Bearer \$(gcloud auth print-access-token)' \\"
                          echo "    -H 'Content-Type: application/json' \\"
                          echo "    -d '{\"trafficConfig\":{\"trafficSplitManual\":{\"targets\":[{\"runtimeRevisionName\":\"$OLD_REVISION\",\"percent\":100}]}}}' \\"
                          echo "    '${API_BASE}/projects/${GOOGLE_CLOUD_PROJECT}/locations/${GOOGLE_CLOUD_LOCATION}/reasoningEngines/${RESOURCE_ID}?update_mask=traffic_config'"
                        else
                          echo "=== ROLLING BACK to old revision ==="
                          curl -s -X PATCH \
                            -H "Authorization: Bearer $TOKEN" \
                            -H "Content-Type: application/json" \
                            -d "{
                              \"trafficConfig\": {
                                \"trafficSplitManual\": {
                                  \"targets\": [
                                    {\"runtimeRevisionName\": \"$OLD_REVISION\", \"percent\": 100}
                                  ]
                                }
                              }
                            }" \
                            "${API_BASE}/projects/${GOOGLE_CLOUD_PROJECT}/locations/${GOOGLE_CLOUD_LOCATION}/reasoningEngines/${RESOURCE_ID}?update_mask=traffic_config"

                          echo ""
                          echo "Pipeline FAILED. Rolled back."
                          echo "Active revision: $OLD_REVISION"
                          echo "Failed revision: $NEW_REVISION"
                          exit 1
                        fi
